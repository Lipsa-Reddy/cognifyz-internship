<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Internship - Level 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Navigation Menu (3 Links) -->
    <nav class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- 2. Simple Webpage Content (Heading, Paragraph, Image) -->
    <main class="content-area" id="home">
        <h1>Welcome to My Internship Project</h1>
        <p>This simple webpage is built using HTML and CSS to demonstrate foundational front-end development skills for the Cognifyz Technologies internship program.</p>
        
        <!-- Placeholder image - you can replace the URL with your own local image later -->
        <!-- Replace your old <img> line with this one -->
<img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80" alt="Web Development Concept" class="responsive-img">
    </main>

    <!-- 3. Basic Form (Single Input & Submit Button) -->
    <section class="form-section" id="contact">
        <h2>Stay Updated</h2>
        <form class="simple-form">
            <input type="email" placeholder="Enter your email address" required class="form-input">
            <button type="submit" class="submit-btn">Subscribe</button>
        </form>
    </section>

</body>
